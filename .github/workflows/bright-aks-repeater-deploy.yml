name: Deploy Repeater to AKS (installing agents)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: brightacr12345
  IMAGE_NAME: repeater
  RESOURCE_GROUP: rg-bright-dev
  AKS_NAME: bright-aks

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 🔥 Login to ACR
      - name: ACR Login
        run: az acr login --name $ACR_NAME

      # 🔥 Build image
      - name: Build Image
        run: docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:v1 .

      # 🔥 Push image
      - name: Push Image
        run: docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:v1

      # 🔥 Connect to AKS
      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_NAME \
            --overwrite-existing

      # 🔥 Deploy
      - name: Deploy to AKS
        run: |
          kubectl create deployment repeater \
            --image=$ACR_NAME.azurecr.io/$IMAGE_NAME:v1 \
            --dry-run=client -o yaml | kubectl apply -f -