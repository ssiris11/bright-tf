name: Deploy Bright infra Linux VM (Terraform)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Azure Login (OIDC)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ⚙️ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 📦 Init
      - name: Terraform Init
        run: terraform init

      # 🔍 Plan
      - name: Terraform Plan
        run: terraform plan

      # 🚀 Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve